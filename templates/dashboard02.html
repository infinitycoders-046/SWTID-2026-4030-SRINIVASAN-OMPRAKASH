<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard 02</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

.container-fluid{
    width:100vw;
    height:100vh;
    padding:0;
    margin:0;
}

.card{
    width:100%;
    height:100%;
    border:none;
    border-radius:0;
}

.card-body{
    height:100%;
    display:flex;
    flex-direction:column;
    padding:10px;
    overflow:hidden;
}

.dashboard-title{
    text-align:center;
    margin-bottom:10px;
    flex-shrink:0;
}

.tableauPlaceholder{
    flex:1;
    width:100%;
    overflow:hidden;
    position:relative;
}
</style>
</head>

<body>

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-body">

            <h4 class="dashboard-title">
                Regional Energy Analysis
            </h4>

            <div class="tableauPlaceholder"
                 id="viz1781513341115">

                <noscript>
                    <a href="#">
                        <img alt="Dashboard 2"
                             src="https://public.tableau.com/static/images/R4/R4NS6ZMPM/1_rss.png"
                             style="border:none;width:100%;">
                    </a>
                </noscript>

                <object class="tableauViz" style="display:none;">

                    <param name="host_url"
                           value="https%3A%2F%2Fpublic.tableau.com%2F" />

                    <param name="embed_code_version"
                           value="3" />

                    <param name="path"
                           value="shared/R4NS6ZMPM" />

                    <param name="toolbar"
                           value="yes" />

                    <param name="static_image"
                           value="https://public.tableau.com/static/images/R4/R4NS6ZMPM/1.png" />

                    <param name="animate_transition"
                           value="yes" />

                    <param name="display_static_image"
                           value="yes" />

                    <param name="display_spinner"
                           value="yes" />

                    <param name="display_overlay"
                           value="yes" />

                    <param name="display_count"
                           value="yes" />

                    <param name="language"
                           value="en-US" />

                    <param name="filter"
                           value="publish=yes" />

                </object>

            </div>

        </div>

    </div>

</div>

<script type="text/javascript">

var divElement = document.getElementById('viz1781513341115');
var vizElement = divElement.getElementsByTagName('object')[0];

vizElement.style.width = '100%';
vizElement.style.height = '100%';

var scriptElement = document.createElement('script');
scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';

vizElement.parentNode.insertBefore(
    scriptElement,
    vizElement
);

</script>

</body>
</html>
