<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard 01</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden; /* Prevent page scrolling */
}

.container-fluid {
    height: 100vh;
    padding: 10px;
}

.card {
    height: calc(100vh - 20px);
}

.card-body {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.tableauPlaceholder {
    flex: 1;
    width: 100%;
}
</style>
</head>

<body>

<div class="container-fluid">

    <div class="card shadow h-100">
        <div class="card-body">

            <h4 class="text-center mb-3">
                Monthly Electricity Consumption
            </h4>

            <div class="tableauPlaceholder"
                 id="viz1781513166776"
                 style="position:relative;">

                <noscript>
                    <a href="#">
                        <img alt="Dashboard"
                             src="https://public.tableau.com/static/images/8F/8FXG62QGR/1_rss.png"
                             style="border:none;width:100%;">
                    </a>
                </noscript>

                <object class="tableauViz" style="display:none;">
                    <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F"/>
                    <param name="embed_code_version" value="3"/>
                    <param name="path" value="shared/8FXG62QGR"/>
                    <param name="toolbar" value="yes"/>
                    <param name="static_image"
                           value="https://public.tableau.com/static/images/8F/8FXG62QGR/1.png"/>
                    <param name="animate_transition" value="yes"/>
                    <param name="display_static_image" value="yes"/>
                    <param name="display_spinner" value="yes"/>
                    <param name="display_overlay" value="yes"/>
                    <param name="display_count" value="yes"/>
                    <param name="language" value="en-US"/>
                    <param name="filter" value="publish=yes"/>
                </object>

            </div>

        </div>
    </div>

</div>

<script>
var divElement = document.getElementById('viz1781513166776');
var vizElement = divElement.getElementsByTagName('object')[0];

vizElement.style.width = '100%';
vizElement.style.height = '100%';

var scriptElement = document.createElement('script');
scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

</body>
</html>
